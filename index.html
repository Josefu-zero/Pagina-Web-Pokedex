<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokedex Nacional</title>
  </head>
  <body>
    <header>
      <h1>Pokedex Nacional</h1>
    </header>

    <section class="controls">
    <input type="text" id="search-input" placeholder="Buscar por nombre o ID...">
    
    <select id="gen-filter">
      <option value="all">Todas las Generaciones</option>
      <option value="1">G1 (Kanto)</option>
      <option value="2">G2 (Johto)</option>
      <option value="3">G3 (Hoenn)</option>
      <option value="4">G4 (Sinnoh)</option>
      <option value="5">G5 (Unova)</option>
      <option value="6">G6 (Kalos)</option>
      <option value="7">G7 (Alola)</option>
      <option value="8">G8 (Galar)</option>
      <option value="9">G9 (Paldea)</option>
    </select>
  </section>

  <main id="pokemon-grid" class="grid-container"></main>

  <div class="load-more-container">
    <button id="load-more">Cargar más Pokémon</button>
  </div>




    <main id="pokemon-grid" class="grid-container"></main>

    <div id="pokemon-modal" class="modal">
      <div class="modal-content">
        <span class="close-button">&times;</span>
        <div id="modal-body"></div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
