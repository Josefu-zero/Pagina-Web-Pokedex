<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>js-node</title>
    <p> Lab. Lista de Pokemon xd </p>
  </head>
  <body>
    <input type="text" id="text">
      <div id="caja"
      style="
        width:300px;
        height:300px;
        background:red;
        ">
      </div>
      <button id="color">Cambiar color</button>


      <button id="cargar">Cargar Pokemon</button>
      <ul id="pokemon-list"></ul>



    <script>
      //detectar teclas
      document.getElementById("text")
              .addEventListener("keydown", function(event){
                console.log("tecla:", event.key);
                });
      // coordenadas del mouse
      document.getElementById("caja")
              .addEventListener("mousemove", function(event){
                console.log(event.clientX);
                console.log(event.clientY);
              });
      // cambiar color de caja con css
      document.getElementById("color")
              .addEventListener("click", function() {
              let caja = document.getElementById("caja");
              caja.style.background = "blue";
              caja.style.color = "white";
              caja.style.padding = "20px";
      });
      // cargar pokemon de api con fetch
      document.getElementById("cargar")
              .addEventListener("click", function() {
                fetch("https://pokeapi.co/api/v2/pokemon?limit=10")
                  .then(response => response.json())
                  .then(data => {
                    let pokemonList = document.getElementById("pokemon-list");
                    pokemonList.innerHTML = "";
                    data.results.forEach(pokemon => {
                      let li = document.createElement("li");
                          li.textContent = pokemon.name;
                          pokemonList.appendChild(li);
                    });
                  });
              });



    </script>
    <!-- div id="app"></div>
    <script type="module" src="/src/main.js"></script> -->
  </body>
</html>
